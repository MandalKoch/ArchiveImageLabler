services:
  filezippreview:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "127.0.0.1:${IMAGEVAULT_HTTP_PORT:-5080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Library__RootPath: /library
      Library__DataPath: /app/data
      Library__ScanParallelism: ${Library__ScanParallelism:-4}
    volumes:
      - type: bind
        source: ${IMAGEVAULT_LIBRARY_PATH:?Set IMAGEVAULT_LIBRARY_PATH in .env}
        target: /library
        read_only: true
      - type: bind
        source: ${IMAGEVAULT_DATA_PATH:?Set IMAGEVAULT_DATA_PATH in .env}
        target: /app/data
